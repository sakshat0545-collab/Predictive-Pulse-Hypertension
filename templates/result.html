<!DOCTYPE html>
<html>
<head>
    <title>Hypertension Risk Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            width: 520px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 5px;
            font-weight: 600;
        }

        .brand {
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }

        .risk {
            font-size: 24px;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            color: white;
        }

        .btn {
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            font-weight: 500;
        }

        .disclaimer {
            font-size: 11px;
            color: #888;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Predictive Pulse</h2>
    <div class="brand">AI-Based Hypertension Risk Assessment</div>

    <div class="risk" 
         style="background-color: {% if badge_color == 'success' %}#28a745{% else %}#dc3545{% endif %};">
        {{ prediction_text }}
    </div>

    <a href="/" class="btn">Analyze Another Case</a>

    <div class="disclaimer">
        This tool is intended for educational and decision-support purposes only.
        It does not replace professional medical diagnosis.
    </div>
</div>

</body>
</html>
